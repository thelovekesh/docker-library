name: release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Docker bake target to build and push
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.target }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-images:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup qemu
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: docker login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: setup builder
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0
        with:
          driver: cloud
          endpoint: thelovekesh/php

      - name: generate image meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ github.repository }}
          tags: |
            type=ref,event=branch
          bake-target: meta-helper

      - name: build and push images
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          push: true
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file }}
          targets: ${{ github.event.inputs.target }}
          set: |
            *.cache-from=type=gha,scope=${{ github.event.inputs.target }}
            *.cache-to=type=gha,mode=max,scope=${{ github.event.inputs.target }}
